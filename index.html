<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitCoach Pro - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#FFB800', // اللون الذهبي
                        bgDark: '#0A101C', // الخلفية المظلمة جداً
                        cardDark: '#131A29' // لون الكروت
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-bgDark text-white font-sans flex flex-col justify-center items-center min-h-screen p-6">

    <button class="fixed top-6 right-6 text-sm text-slate-500 border border-slate-700 px-4 py-1.5 rounded-xl hover:bg-cardDark transition">
        English
    </button>

    <div class="text-center mb-12 flex flex-col items-center">
        <div class="flex items-center gap-2 mb-1">
            <h1 class="text-5xl font-black text-white">FIT<span class="text-brand">COACH</span></h1>
            <span class="text-xs text-slate-500 mt-5">PRO</span>
        </div>
        <p class="text-slate-500 text-sm mt-2">منصة التدريب الشخصي — تمارين · تغذية · متابعة</p>
    </div>

    <div class="grid grid-cols-2 gap-5 w-full max-w-lg mb-12">
        
        <a href="#" class="bg-cardDark border border-slate-800 p-8 rounded-2xl flex flex-col items-center gap-4 hover:border-brand/40 hover:scale-[1.03] transition-all cursor-pointer shadow-lg group">
            <div class="text-6xl group-hover:animate-bounce">💪</div>
            <h2 class="text-xl font-bold text-center mt-3">دخول العميل</h2>
        </a>

        <a href="#" class="bg-cardDark border border-slate-800 p-8 rounded-2xl flex flex-col items-center gap-4 hover:border-blue-400/40 hover:scale-[1.03] transition-all cursor-pointer shadow-lg group">
            <div class="text-6xl group-hover:animate-bounce">🏋️‍♀️</div>
            <h2 class="text-xl font-bold text-center mt-3">دخول المدرب</h2>
        </a>
    </div>

    <div class="text-center text-slate-600 text-sm flex items-center gap-2 opacity-60">
        <span>⚡️</span>
        <p>نسخة تجريبية — اضغط للدخول</p>
    </div>

</body>
</html>
