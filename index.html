<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitCoach Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #0A101C; color: white; font-family: sans-serif; }
        .card-dark { background: #131A29; border: 1px solid #1e293b; }
        .brand-yellow { color: #FFB800; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [view, setView] = useState('login'); // login or dashboard

            if (view === 'login') {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen p-6">
                        <div className="text-center mb-12">
                            <h1 className="text-5xl font-black mb-2">FIT<span className="brand-yellow">COACH</span> PRO</h1>
                            <p className="text-slate-500">منصة التدريب الشخصي — تمارين · تغذية · متابعة</p>
                        </div>
                        <div className="grid grid-cols-2 gap-6 w-full max-w-lg">
                            <div onClick={() => setView('dashboard')} className="card-dark p-8 rounded-2xl flex flex-col items-center cursor-pointer hover:border-yellow-500 transition shadow-2xl">
                                <span className="text-6xl mb-4">💪</span>
                                <h2 className="text-xl font-bold">دخول العميل</h2>
                            </div>
                            <div onClick={() => setView('dashboard')} className="card-dark p-8 rounded-2xl flex flex-col items-center cursor-pointer hover:border-blue-500 transition shadow-2xl">
                                <span className="text-6xl mb-4">🏋️‍♀️</span>
                                <h2 className="text-xl font-bold">دخول المدرب</h2>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto min-h-screen pb-20">
                    <div className="p-6 bg-slate-900 border-b border-slate-800 flex justify-between items-center">
                        <h1 className="text-xl font-bold">لوحة المتابعة</h1>
                        <button onClick={() => setView('login')} className="text-xs bg-slate-800 px-3 py-1 rounded">خروج</button>
                    </div>
                    <div className="p-4 space-y-4">
                        <div className="card-dark p-4 rounded-xl">
                            <h3 className="brand-yellow font-bold mb-2">تمرين اليوم: صدر + تراي</h3>
                            <ul className="text-sm text-slate-300 space-y-1">
                                <li>• بنش برس: 4 جولات</li>
                                <li>• تجميع دمبل: 3 جولات</li>
                            </ul>
                        </div>
                        <div className="card-dark p-4 rounded-xl">
                            <h3 className="text-green-500 font-bold mb-2">الوجبة القادمة:</h3>
                            <p className="text-sm">200ج صدر دجاج + رز</p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
